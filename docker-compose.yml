version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kku_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres7842
      POSTGRES_DB: kku_scorecard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kku_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres7842@postgres:5432/kku_scorecard?schema=public"
      PYTHON_EXECUTABLE: /usr/bin/python3
      AUTH_MODE: DEV
      ADMIN_EMAILS: chetsada.k@kkumail.com
      # 32-byte hex key for encrypting sensitive settings at rest. Required to boot.
      # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      ENCRYPTION_KEY: 8d09db15ed247efef0e86512ca10222a42bcc36e7889af751a9b8d6790f5d838
      NODE_ENV: development
      FRONTEND_URL: http://nginx:80
      APP_BASE_URL: https://localhost:4333
      SSO_REDIRECT_URL: https://localhost:4333/callback

    volumes:
      - ./python:/app/python:ro
      - backend_data:/app/data
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    container_name: kku_frontend
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: kku_nginx
    ports:
      - "4333:443"
    depends_on:
      - frontend
      - backend
    networks:
      - app_network
    restart: unless-stopped

volumes:
  postgres_data:
  backend_data:

networks:
  app_network:
    driver: bridge
